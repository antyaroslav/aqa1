name: Java CI

on:
  push:
    branches: [ main, master, testng, junit4 ]
  pull_request:
    branches: [ main, master, testng, junit4 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and Test
        run: |
          chmod +x ./gradlew
          chmod +x ./gradlew.bat
          ./gradlew clean build test